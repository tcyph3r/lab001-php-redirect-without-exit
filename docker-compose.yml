version: '3.8'

services:
  app:
    build: .
    ports:
      - "8888:80"
    volumes:
      - ./app:/var/www/html
    depends_on:
      - db

  db:
    image: mariadb:10.6
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: lab001
      MYSQL_USER: lab
      MYSQL_PASSWORD: lab
    volumes:
      - ./db/seed.sql:/docker-entrypoint-initdb.d/seed.sql
